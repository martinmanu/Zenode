<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenode Engine</title>
    <link rel="stylesheet" href="./zenode.css">
    <style>
        #canvasContainer {
            width: 800px;
            height: 500px;
            border: 1px solid #000;
            position: relative;
            margin: 20px auto;
        }
        button {
            margin: 5px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Zenode Engine Demo</h1>
    
    <div id="canvasContainer"></div>
    
    <script type="importmap">
    {
      "imports": {
        "d3": "https://cdn.jsdelivr.net/npm/d3@7/+esm"
      }
    }
    </script>

    <script type="module">
        import { initializeCanvas, createShape, connectFirstTwoNodes, setLassoEnabled } from "../dist/index.js";
        import { testConfig } from "../dist/config/testConfig.js";

        let lassoEnabled = false;

        document.addEventListener("DOMContentLoaded", () => {
            initializeCanvas("#canvasContainer", testConfig);
            setLassoEnabled(lassoEnabled);
        });

        window.addRectangle = () => {
            createShape("rectangle", "task0");
        };

        window.addCircle = () => {
            createShape("circle", "circle1");
        };

        window.addRhombus = () => {
            createShape("rhombus", "rhombus1");
        };

        window.toggleLasso = () => {
            lassoEnabled = !lassoEnabled;
            setLassoEnabled(lassoEnabled);
            const btn = document.getElementById("lassoToggleBtn");
            if (btn) {
                btn.textContent = lassoEnabled ? "Disable Lasso" : "Enable Lasso";
            }
        };

        window.connectShapes = () => {
            connectFirstTwoNodes();
        };
    </script>
     <button onclick="addRectangle()">Add Rectangle</button>
    <button onclick="addCircle()">Add Circle</button>
    <button onclick="addRhombus()">Add Rhombus</button>
    <button id="lassoToggleBtn" onclick="toggleLasso()">Enable Lasso</button>
    <button onclick="connectShapes()">Connect Shapes</button>
</body>
</html>
