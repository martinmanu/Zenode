<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenode Engine</title>
    <style>
        #canvasContainer {
            width: 800px;
            height: 500px;
            border: 1px solid #000;
            position: relative;
            margin: 20px auto;
        }
        button {
            margin: 5px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Zenode Engine Demo</h1>
    
    <div id="canvasContainer"></div>
    
    <script type="importmap">
    {
      "imports": {
        "d3": "https://cdn.jsdelivr.net/npm/d3@7/+esm"
      }
    }
    </script>

    <script type="module">
        import { initializeCanvas, createShape, connectFirstTwoNodes } from "../dist/zenode.esm.js";

        document.addEventListener("DOMContentLoaded", () => {
            initializeCanvas("#canvasContainer", { gridSize: 20 });
        });

        window.addRectangle = () => {
            createShape("rectangle", "task0");
        };

        window.addCircle = () => {
            createShape("circle", "circle1");
        };

        window.connectShapes = () => {
            connectFirstTwoNodes();
        };
    </script>
     <button onclick="addRectangle()">Add Rectangle</button>
    <button onclick="addCircle()">Add Circle</button>
    <button onclick="connectShapes()">Connect Shapes</button>
</body>
</html>
