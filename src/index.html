<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenode Engine</title>
    <link rel="stylesheet" href="./zenode.css">
    <style>
        #canvasContainer {
            width: 800px;
            height: 500px;
            border: 1px solid #000;
            position: relative;
            margin: 20px auto;
        }

        button {
            margin: 5px;
            padding: 10px;
        }
    </style>
</head>

<body>
    <h1>Zenode Engine Demo</h1>

    <div id="canvasContainer"></div>


    <script type="module">
        import * as Zenode from "../dist/index.js";
        import { testConfig } from "../dist/config/testConfig.js";

        // Make Zenode globally available for the inline onclick handlers
        window.Zenode = Zenode;

        let lassoEnabled = false;

        document.addEventListener("DOMContentLoaded", () => {
            Zenode.initializeCanvas("#canvasContainer", testConfig);
            Zenode.setLassoEnabled(lassoEnabled);
        });

        window.addRectangle = () => {
            Zenode.createShape("rectangle", "task0");
        };

        window.addRectangle1 = () => {
            Zenode.createShape("rectangle", "task1");
        };

        window.addCircle = () => {
            Zenode.createShape("circle", "circle1");
        };

        window.addRhombus = () => {
            Zenode.createShape("rhombus", "rhombus1");
        };

        window.toggleLasso = () => {
            lassoEnabled = !lassoEnabled;
            Zenode.setLassoEnabled(lassoEnabled);
            const btn = document.getElementById("lassoToggleBtn");
            if (btn) {
                btn.textContent = lassoEnabled ? "Disable Lasso" : "Enable Lasso";
            }
        };

        window.toggleConnection = () => {
            window.connectionMode = !(window.connectionMode || false);
            Zenode.setConnectionModeEnabled(window.connectionMode);
            const btn = document.getElementById("toggleConnection");
            if (btn) {
                btn.textContent = window.connectionMode ? "Disable Connection Mode" : "Enable Connection Mode";
            }
        };

        window.setConnectionType = (type) => {
            Zenode.setActiveConnectionType(type);
        };

        window.toggleSmartRouting = (enabled) => {
            Zenode.setSmartRoutingEnabled(enabled);
            const tier = Zenode.getLicenseTier?.() || "free";
            if (enabled && tier === "free") {
                alert("Smart Routing is a Pro feature. Please enter a valid Pro license key.");
                document.getElementById('smartRouting').checked = false;
                Zenode.setSmartRoutingEnabled(false);
            }
        };

        window.updateLabelConfig = () => {
            const enabled = document.getElementById('enableLabels').checked;
            const text = document.getElementById('labelText').value;
            Zenode.setConnectionLabel(text, enabled);
        };

        window.toggleProFeatures = () => {
            const group = document.getElementById('proControls');
            group.style.display = group.style.display === 'none' ? 'block' : 'none';
        };

        // Initialize display
        setTimeout(() => {
            const tier = Zenode.getLicenseTier?.() || "free";
            document.getElementById('licenseStatus').innerText = "Tier: " + tier.toUpperCase();
        }, 500);

    </script>
    <style>
        .nav-controls {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }
        .nav-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: #333;
            color: white;
            border: 1px solid #444;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .nav-btn:hover {
            background: #444;
            transform: scale(1.05);
        }
        .nav-btn:active {
            transform: scale(0.95);
        }
    </style>

    <div class="nav-controls">
        <button class="nav-btn" onclick="Zenode.zoomIn()" title="Zoom In">+</button>
        <button class="nav-btn" onclick="Zenode.zoomOut()" title="Zoom Out">−</button>
        <button class="nav-btn" onclick="Zenode.focusOnSelectedNode()" title="Focus Selected">◎</button>
    </div>

    <div style="background: #333; padding: 10px; border-radius: 8px; margin: 20px auto; width: 800px;">
        <button onclick="addRectangle()">Add Rectangle</button>
        <button onclick="addRectangle1()">Add Rectangle1</button>
        <button onclick="addCircle()">Add Circle</button>
        <button onclick="addRhombus()">Add Rhombus</button>
        <button id="lassoToggleBtn" onclick="toggleLasso()">Enable Lasso</button>
        <button onclick="Zenode.registerSmartConnect()">Add Smart Connect Action</button>
        <button onclick="toggleProFeatures()">Toggle Pro Controls</button>

        <div class="control-group">
            <button id="toggleConnection" onclick="window.toggleConnection()">Enable Connection Mode</button>
            <select id="connectionType" onchange="window.setConnectionType(this.value)">
                <option value="straight">Straight</option>
                <option value="curved">Curved</option>
                <option value="s-shaped">S-Shaped</option>
                <option value="l-bent">L-Bent</option>
            </select>
            <label style="color: white; margin-left: 10px;">
                <input type="checkbox" id="enableLabels" onchange="window.updateLabelConfig()"> Labels
            </label>
            <input type="text" id="labelText" placeholder="Label Text" value="Sample" oninput="window.updateLabelConfig()" style="padding: 6px; border-radius: 4px; border: 1px solid #444; background: #222; color: white; width: 100px;">
        </div>

        <div id="proControls" style="display: none; border-top: 1px solid #555; margin-top: 10px; padding-top: 10px;">
            <div class="control-group">
                <label style="color: white; margin-right: 10px;">
                    <input type="checkbox" id="smartRouting" onchange="window.toggleSmartRouting(this.checked)"> Smart Routing (Pro)
                </label>
                <input type="text" id="licenseKey" placeholder="License Key (e.g. ZEN-PRO-123)" oninput="window.updateLicense(this.value)" style="padding: 6px; border-radius: 4px; border: 1px solid #444; background: #222; color: white; width: 220px;">
                <span id="licenseStatus" style="color: #aaa; margin-left:10px;">Tier: FREE</span>
            </div>
        </div>
    </div>
</body>

</html>

</html>
